<head>

<body>

<div class="container">
    <h1>💰 Smart Budget Planner</h1>

    <form action="/calculate" method="post">
        <input type="number" name="income" placeholder="Oylik daromad (so'm)" required>
        <input type="number" name="expenses" placeholder="Oylik xarajat (so'm)" required>
        <input type="number" name="savings_goal" placeholder="Tejash maqsadi (so'm)" required>
        <button type="submit">Hisoblash</button>
    </form>

    {% if remaining %}
    <div class="result">
        <h3>💵 Qolgan pul: {{ remaining }} so'm</h3>
        <h3>📈 Har oy yig‘ish kerak: {{ monthly_needed }} so'm</h3>
        <div class="advice">{{ advice }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
